name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: SecretWarehouse
  NODE_VERSION: "22"

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu

          - runner: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc

          - runner: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==================== Frontend Setup ====================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # ==================== Rust Setup ====================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.label }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      # ==================== Platform Dependencies ====================
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Windows NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "src-tauri/icons/icon.iconset" ]; then
            iconutil -c icns -o "src-tauri/icons/icon.icns" "src-tauri/icons/icon.iconset"
            echo "Generated icon.icns"
          else
            echo "Warning: icon.iconset directory not found"
          fi

      # ==================== Build ====================
      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Verify frontend build
        shell: bash
        run: |
          if [ ! -d "dist/env" ]; then
            echo "Error: dist/env directory not found!"
            ls -la dist/ || echo "dist/ directory does not exist"
            exit 1
          fi
          echo "Frontend build verified: dist/env exists"
          ls -la dist/env/

      - name: Build Tauri application
        shell: bash
        env:
          CI: true
        run: npm run tauri build -- --target ${{ matrix.target }}

      # ==================== Package Artifacts ====================
      - name: Package Linux build
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          BASE_NAME="${APP_NAME}-${TAG_NAME}-${{ matrix.label }}"
          mkdir -p release

          # Find AppImage
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release/${BASE_NAME}.AppImage"
            chmod +x "release/${BASE_NAME}.AppImage"
            echo "Packaged: ${BASE_NAME}.AppImage"
          fi

          # Find deb
          DEB=$(find src-tauri/target -name "*.deb" -type f | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release/${BASE_NAME}.deb"
            echo "Packaged: ${BASE_NAME}.deb"
          fi

          ls -lh release/

      - name: Package macOS build
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          BASE_NAME="${APP_NAME}-${TAG_NAME}-${{ matrix.label }}"
          mkdir -p release

          # Find DMG
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release/${BASE_NAME}.dmg"
            echo "Packaged: ${BASE_NAME}.dmg"
          fi

          # Find and zip .app bundle
          APP=$(find src-tauri/target -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            cd "$(dirname "$APP")"
            ditto -c -k --sequesterRsrc --keepParent "$(basename "$APP")" "${OLDPWD}/release/${BASE_NAME}.zip"
            cd "$OLDPWD"
            echo "Packaged: ${BASE_NAME}.zip"
          fi

          ls -lh release/

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          $BASE_NAME = "${env:APP_NAME}-${env:TAG_NAME}-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path release

          # Find NSIS installer
          $NSIS = Get-ChildItem -Path "src-tauri/target" -Filter "*.exe" -Recurse |
            Where-Object { $_.FullName -match "nsis" } | Select-Object -First 1
          if ($NSIS) {
            Copy-Item $NSIS.FullName "release/${BASE_NAME}-setup.exe"
            echo "Packaged: ${BASE_NAME}-setup.exe"
          }

          # Find MSI
          $MSI = Get-ChildItem -Path "src-tauri/target" -Filter "*.msi" -Recurse | Select-Object -First 1
          if ($MSI) {
            Copy-Item $MSI.FullName "release/${BASE_NAME}.msi"
            echo "Packaged: ${BASE_NAME}.msi"
          }

          Get-ChildItem release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: release/**/*
          if-no-files-found: warn

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
            prerelease="false"
            draft="false"
          fi

          if [ -z "$release_name" ]; then
            release_name="${{ env.APP_NAME }} ${tag_name}"
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: release-assets/*
