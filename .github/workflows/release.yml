name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  APP_NAME: SecretWarehouse
  NODE_VERSION: "22"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x64
          - runner: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x64
          - runner: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            asset_suffix: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "NSIS installed, makensis path:"
          Get-Command makensis -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "src-tauri/icons/icon.iconset" ]; then
            iconutil -c icns -o "src-tauri/icons/icon.icns" "src-tauri/icons/icon.iconset"
            echo "Generated icon.icns"
          else
            echo "icon.iconset not found, skipping icns generation"
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        shell: bash
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Package build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          BASE_NAME="${APP_NAME}-${TAG_NAME}-${{ matrix.asset_suffix }}"
          mkdir -p release

          # AppImage
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release/${BASE_NAME}.AppImage"
            chmod +x "release/${BASE_NAME}.AppImage"
          fi

          # deb package
          DEB=$(find src-tauri/target -name "*.deb" -type f 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release/${BASE_NAME}.deb"
          fi

          # tar.gz portable
          if [ -n "$APPIMAGE" ]; then
            mkdir -p tmp_pkg
            cp "$APPIMAGE" "tmp_pkg/${APP_NAME}"
            chmod +x "tmp_pkg/${APP_NAME}"
            tar -czf "release/${BASE_NAME}.tar.gz" -C tmp_pkg .
            rm -rf tmp_pkg
          fi

          ls -lh release/

      - name: Package build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          BASE_NAME="${APP_NAME}-${TAG_NAME}-${{ matrix.asset_suffix }}"
          mkdir -p release

          # DMG installer
          DMG=$(find src-tauri/target -name "*.dmg" -type f 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release/${BASE_NAME}.dmg"
            echo "Created DMG: ${BASE_NAME}.dmg"
          fi

          # Portable zip with .app bundle
          APP_BUNDLE=$(find src-tauri/target -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            cd "$(dirname "$APP_BUNDLE")"
            /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$(basename "$APP_BUNDLE")" "${OLDPWD}/release/${BASE_NAME}-portable.zip"
            cd "$OLDPWD"
            echo "Created portable: ${BASE_NAME}-portable.zip"
          fi

          ls -lh release/

      - name: Package build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          $BASE_NAME = "${env:APP_NAME}-${env:TAG_NAME}-${{ matrix.asset_suffix }}"
          New-Item -ItemType Directory -Force -Path release

          # NSIS installer - search in bundle directory
          $NSIS_EXE = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $NSIS_EXE) {
            $NSIS_EXE = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($NSIS_EXE) {
            Copy-Item $NSIS_EXE.FullName "release/${BASE_NAME}-installer.exe"
            Write-Host "Created installer: ${BASE_NAME}-installer.exe"
          } else {
            Write-Host "NSIS installer not found"
          }

          # Portable zip - find executable
          $APP_EXE = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release" -Filter "secret-warehouse.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $APP_EXE) {
            $APP_EXE = Get-ChildItem -Path "src-tauri/target/release" -Filter "secret-warehouse.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($APP_EXE) {
            Compress-Archive -Path $APP_EXE.FullName -DestinationPath "release/${BASE_NAME}-portable.zip" -Force
            Write-Host "Created portable: ${BASE_NAME}-portable.zip"
          } else {
            Write-Host "Executable not found"
          }

          Get-ChildItem -Path release -File

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lhR release-assets/

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
            prerelease="false"
            draft="false"
          fi

          if [ -z "$release_name" ]; then
            release_name="${APP_NAME} ${tag_name}"
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
