name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: SecretWarehouse
  NODE_VERSION: "22"

jobs:
  check:
    name: Check ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x64
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
          - runner: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci-${{ matrix.label }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev

      - name: Validate macOS iconset
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d "src-tauri/icons/icon.iconset" ]; then
            echo "iconset directory exists"
            ls -la src-tauri/icons/icon.iconset/
          else
            echo "WARNING: icon.iconset directory not found"
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
