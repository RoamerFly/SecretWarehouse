name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: SecretWarehouse
  NODE_VERSION: "22"

jobs:
  check:
    name: Check (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu

          - runner: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc

          - runner: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==================== Frontend Setup ====================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # ==================== Rust Setup ====================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci-${{ matrix.label }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      # ==================== Linux Dependencies ====================
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      # ==================== Frontend Checks ====================
      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      # ==================== Rust Checks ====================
      - name: Cargo check
        shell: bash
        run: cargo check --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Cargo clippy
        shell: bash
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} -- -D warnings

      - name: Cargo test
        shell: bash
        run: cargo test --manifest-path src-tauri/Cargo.toml
